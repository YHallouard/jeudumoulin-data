services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.6.0
    container_name: mlflow_server
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/tmp/mlruns
      - ./mlartifacts:/tmp/mlartifacts
    command: >
      sh -c "
      chmod -R 777 /tmp/mlruns /tmp/mlartifacts &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////tmp/mlruns/mlflow.db
      --artifacts-destination /tmp/mlartifacts
      --serve-artifacts
      "
    restart: unless-stopped
