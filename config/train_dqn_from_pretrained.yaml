config:
  strategy: dqn
  agent:
    model_path: models/dqn/
    device: cpu
  training:
    episodes: 1000
    learning_rate: 0.001
    gamma: 0.99
    batch_size: 128
    buffer_size: 10000
    epsilon_start: 1.0
    epsilon_end: 0.1
    epsilon_decay: 0.999
    opponent: self
    max_steps: 300
    use_prioritized_replay: false
    save_folder: models/dqn
    save_frequency: 100
    eval_frequency: 100
    eval_games: 50
    verbose: true
